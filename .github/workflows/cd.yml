name: CD

on: workflow_call


jobs:
  publish_npm:
    name: Publish to NPM
    runs-on: ubuntu-latest
    steps:
      - name: Initialize repo
        uses: actions/checkout@v3    

      - name: Prepare package
        run: npm ci
      
      - name: Publish package 
        run: npm publish 
        env: 
          NODE_AUTH_TOKEN: ${{ secrets.NPM_PUBLISH_TOKEN }}